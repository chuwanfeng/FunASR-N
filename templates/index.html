<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FunASR-N · 语音识别</title>
    <style>
        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-hover: #1e2a4a;
            --accent-primary: #00d4aa;
            --accent-secondary: #00a8e8;
            --accent-gradient: linear-gradient(135deg, #00d4aa 0%, #00a8e8 100%);
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0b8;
            --text-muted: #6b6b8a;
            --border-color: #2a2a4a;
            --success: #00d4aa;
            --warning: #f5a623;
            --error: #ff4757;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 20px rgba(0, 212, 170, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* 顶部导航 */
        .navbar {
            background: rgba(15, 15, 35, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.3rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--accent-gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            -webkit-text-fill-color: white;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .nav-link {
            padding: 8px 16px;
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-link:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        .nav-link.active {
            color: var(--accent-primary);
            background: rgba(0, 212, 170, 0.1);
        }

        .nav-status {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 主布局 */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 24px;
        }

        @media (max-width: 1024px) {
            .main-container { grid-template-columns: 1fr; }
        }

        /* 面板 */
        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .panel:hover {
            border-color: rgba(0, 212, 170, 0.3);
            box-shadow: var(--shadow-glow);
        }

        .panel-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 上传区域 */
        .upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 212, 170, 0.02);
            position: relative;
            overflow: hidden;
        }

        .upload-zone:hover {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        .upload-zone.dragover {
            border-color: var(--accent-primary);
            background: rgba(0, 212, 170, 0.08);
        }

        .upload-icon-large { font-size: 48px; margin-bottom: 12px; opacity: 0.8; }
        .upload-text { font-size: 1rem; color: var(--text-primary); margin-bottom: 8px; }
        .upload-hint { font-size: 0.8rem; color: var(--text-muted); }

        /* 文件列表 */
        .file-list {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file-chip {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: var(--bg-hover);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .file-chip:hover { border-color: var(--accent-primary); }

        .file-chip-info { flex: 1; min-width: 0; }
        .file-chip-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-chip-size { font-size: 0.75rem; color: var(--text-muted); }

        .file-chip-remove {
            background: none;
            border: none;
            color: var(--error);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s;
            opacity: 0.7;
        }

        .file-chip-remove:hover { opacity: 1; background: rgba(255, 71, 87, 0.1); }

        /* 配置项 */
        .config-item { margin-bottom: 16px; }
        .config-item:last-child { margin-bottom: 0; }
        .config-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .config-input, .config-select {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .config-input:focus, .config-select:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
        }
        .config-input::placeholder { color: var(--text-muted); }

        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: white;
            width: 100%;
            box-shadow: 0 4px 16px rgba(0, 212, 170, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0, 212, 170, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: var(--bg-hover);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

        .btn-icon {
            padding: 8px;
            background: var(--bg-hover);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            background: var(--bg-primary);
            border-color: var(--accent-primary);
        }

        /* 主内容区 */
        .content-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 进度面板 */
        .progress-panel {
            display: none;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
        }

        .progress-panel.active {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .progress-title { font-size: 0.9rem; font-weight: 600; }

        .progress-percent {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .progress-bar-bg {
            height: 6px;
            background: var(--bg-primary);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--accent-gradient);
            border-radius: 3px;
            transition: width 0.5s ease;
            position: relative;
        }

        .progress-bar-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 20px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
        }

        .progress-stages {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .stage-tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            background: var(--bg-primary);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            transition: all 0.3s;
        }

        .stage-tag.active {
            background: rgba(0, 212, 170, 0.15);
            color: var(--accent-primary);
            border-color: var(--accent-primary);
        }

        .stage-tag.done {
            background: rgba(0, 212, 170, 0.08);
            color: var(--success);
            border-color: rgba(0, 212, 170, 0.3);
        }

        /* 结果面板 */
        .result-panel {
            display: none;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
        }

        .result-panel.active {
            display: block;
            animation: slideDown 0.3s ease;
        }

        .result-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-primary);
        }

        .result-tab {
            flex: 1;
            padding: 14px 20px;
            text-align: center;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .result-tab:hover {
            color: var(--text-secondary);
            background: rgba(255,255,255,0.02);
        }

        .result-tab.active {
            color: var(--accent-primary);
            border-bottom-color: var(--accent-primary);
            background: rgba(0, 212, 170, 0.05);
        }

        .result-body {
            padding: 24px;
            min-height: 300px;
            max-height: 600px;
            overflow-y: auto;
        }

        /* 文本结果 */
        .text-result {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--text-primary);
            white-space: pre-wrap;
        }

        /* 片段列表 */
        .segment-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .segment-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            transition: all 0.2s;
            position: relative;
        }

        .segment-card:hover {
            border-color: rgba(0, 212, 170, 0.3);
            transform: translateX(4px);
        }

        .segment-card.modified {
            border-color: var(--accent-primary);
            background: rgba(0, 212, 170, 0.05);
        }

        .segment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .segment-time {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--accent-secondary);
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }

        .segment-actions { display: flex; gap: 6px; }

        .segment-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-primary);
            padding: 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .segment-text[contenteditable="true"] {
            background: var(--bg-hover);
            border: 1px solid var(--accent-primary);
            outline: none;
        }

        .segment-text[contenteditable="true"]:focus {
            background: var(--bg-primary);
            box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
        }

        .segment-feedback-bar {
            display: none;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
        }

        .segment-card.modified .segment-feedback-bar { display: flex; }

        .feedback-status {
            font-size: 0.8rem;
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* SRT 预览 */
        .srt-preview {
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.8;
            color: var(--text-secondary);
            white-space: pre-wrap;
            background: var(--bg-primary);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        /* 操作栏 */
        .action-bar {
            display: flex;
            gap: 10px;
            padding: 16px 24px;
            background: var(--bg-primary);
            border-top: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }

        /* 提示消息 */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast.success {
            background: rgba(0, 212, 170, 0.15);
            color: var(--success);
            border: 1px solid rgba(0, 212, 170, 0.3);
        }

        .toast.error {
            background: rgba(255, 71, 87, 0.15);
            color: var(--error);
            border: 1px solid rgba(255, 71, 87, 0.3);
        }

        /* 快捷键提示 */
        .kbd {
            display: inline-block;
            padding: 2px 6px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 0.75rem;
            font-family: monospace;
            color: var(--text-secondary);
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* 响应式 */
        @media (max-width: 768px) {
            .main-container { padding: 16px; grid-template-columns: 1fr; }
            .navbar-inner { height: 50px; }
            .logo { font-size: 1.1rem; }
            .nav-links { display: none; }
            .nav-status { display: none; }
            .panel { padding: 16px; }
            .result-tab { padding: 10px; font-size: 0.8rem; }
            .result-body { padding: 16px; }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="logo">
                <div class="logo-icon">🎙️</div>
                <span>FunASR-N</span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link active">🎯 语音识别</a>
                <a href="/hotwords.html" class="nav-link">🔥 热词管理</a>
                <a href="/finetune.html" class="nav-link">🧠 模型微调</a>
            </div>
            <div class="nav-status">
                <div class="status-badge">
                    <span class="status-dot"></span>
                    <span>服务在线</span>
                </div>
                <div class="status-badge" id="engineBadge">🔧 加载中...</div>
            </div>
        </div>
    </nav>

    <!-- 主布局 -->
    <div class="main-container">
        <!-- 左侧边栏 -->
        <aside class="sidebar">
            <!-- 上传面板 -->
            <div class="panel">
                <div class="panel-title">📁 文件上传</div>
                <div class="upload-zone" id="uploadZone">
                    <input type="file" id="fileInput" multiple style="display: none;" accept="video/*,audio/*">
                    <div class="upload-content">
                        <div class="upload-icon-large">📤</div>
                        <div class="upload-text">拖拽文件到此处</div>
                        <div class="upload-hint">或点击选择 · 支持 MP4, MP3, WAV 等</div>
                    </div>
                </div>
                <div class="file-list" id="fileList"></div>
            </div>

            <!-- 配置面板 -->
            <div class="panel">
                <div class="panel-title">⚙️ 识别配置</div>
                <div class="config-item">
                    <label class="config-label">输出格式</label>
                    <select class="config-select" id="outputFormat">
                        <option value="text">纯文本</option>
                        <option value="srt">SRT 字幕</option>
                        <option value="both" selected>文本 + SRT</option>
                    </select>
                </div>
                <div class="config-item">
                    <label class="config-label">热词提示（逗号分隔）</label>
                    <input type="text" class="config-input" id="hotwordsInput" placeholder="例如: 人工智能, 深度学习">
                </div>
                <div class="config-item">
                    <label class="config-label">当前热词</label>
                    <div id="currentHotwords" style="font-size: 0.8rem; color: var(--text-muted);">加载中...</div>
                </div>
                <button class="btn btn-primary" id="startBtn" style="margin-top: 8px;">🚀 开始识别</button>
                <button class="btn btn-secondary btn-sm" id="clearBtn" style="margin-top: 8px; width: 100%;">🗑️ 清空列表</button>
            </div>

            <!-- 快捷操作 -->
            <div class="panel">
                <div class="panel-title">⌨️ 快捷键</div>
                <div style="font-size: 0.8rem; color: var(--text-secondary); line-height: 2;">
                    <div><span class="kbd">Click</span> 编辑字幕</div>
                    <div><span class="kbd">Enter</span> 保存编辑</div>
                    <div><span class="kbd">Ctrl+Z</span> 撤销</div>
                    <div><span class="kbd">Ctrl+Y</span> 重做</div>
                    <div><span class="kbd">Ctrl+Enter</span> 提交反馈</div>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="content-area">
            <!-- 进度面板 -->
            <div class="progress-panel" id="progressPanel">
                <div class="progress-header">
                    <span class="progress-title" id="progressTitle">正在识别...</span>
                    <span class="progress-percent" id="progressPercent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
                </div>
                <div class="progress-stages" id="progressStages">
                    <span class="stage-tag">📤 上传</span>
                    <span class="stage-tag">🎵 音频提取</span>
                    <span class="stage-tag">🎯 语音识别</span>
                    <span class="stage-tag">✏️ 标点恢复</span>
                    <span class="stage-tag">🎬 字幕生成</span>
                </div>
            </div>

            <!-- 结果面板 -->
            <div class="result-panel" id="resultPanel">
                <div class="result-tabs">
                    <div class="result-tab active" data-tab="text">📄 识别文本</div>
                    <div class="result-tab" data-tab="segments">
                        📝 时间轴片段
                        <span id="segmentBadge" style="display: none; background: var(--accent-primary); color: white; padding: 2px 6px; border-radius: 10px; font-size: 0.7rem;">0</span>
                    </div>
                    <div class="result-tab" data-tab="srt">🎬 SRT 字幕</div>
                </div>
                <div class="result-body" id="resultBody">
                    <div class="empty-state">
                        <div class="empty-icon">🎙️</div>
                        <div>上传音频或视频文件开始识别</div>
                    </div>
                </div>
                <div class="action-bar" id="actionBar" style="display: none;">
                    <button class="btn btn-secondary btn-sm" id="copyBtn">📋 复制</button>
                    <button class="btn btn-secondary btn-sm" id="downloadBtn">💾 下载</button>
                    <button class="btn btn-secondary btn-sm" id="previewBtn">👁️ 预览修改</button>
                    <button class="btn btn-secondary btn-sm" id="undoBtn" disabled>↩️ 撤销</button>
                    <button class="btn btn-secondary btn-sm" id="redoBtn" disabled>↪️ 重做</button>
                    <button class="btn btn-primary btn-sm" id="submitAllBtn" style="margin-left: auto;">📤 提交所有反馈</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ==================== 状态管理 ====================
        let selectedFiles = [];
        let currentResult = null;
        let currentAudioHash = '';
        let modifiedSegments = new Map();
        let editHistory = [];
        let historyIndex = -1;
        let activeTab = 'text';

        // ==================== DOM 元素 ====================
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const startBtn = document.getElementById('startBtn');
        const clearBtn = document.getElementById('clearBtn');
        const progressPanel = document.getElementById('progressPanel');
        const progressBar = document.getElementById('progressBar');
        const progressPercent = document.getElementById('progressPercent');
        const progressTitle = document.getElementById('progressTitle');
        const progressStages = document.getElementById('progressStages');
        const resultPanel = document.getElementById('resultPanel');
        const resultBody = document.getElementById('resultBody');
        const actionBar = document.getElementById('actionBar');
        const outputFormat = document.getElementById('outputFormat');
        const hotwordsInput = document.getElementById('hotwordsInput');
        const currentHotwords = document.getElementById('currentHotwords');

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            loadCurrentHotwords();
            loadEngineInfo();
        });

        // ==================== 文件上传 ====================
        uploadZone.addEventListener('click', () => fileInput.click());
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
            fileInput.value = '';
        });

        function handleFiles(files) {
            const validExts = ['.mp4', '.avi', '.mov', '.mkv', '.webm', '.flv', '.mp3', '.wav', '.flac', '.m4a', '.ogg', '.aac'];
            for (const file of files) {
                const ext = '.' + file.name.split('.').pop().toLowerCase();
                if (validExts.includes(ext) && !selectedFiles.find(f => f.name === file.name)) {
                    selectedFiles.push(file);
                }
            }
            renderFileList();
        }

        function renderFileList() {
            if (selectedFiles.length === 0) {
                fileList.innerHTML = '';
                return;
            }
            fileList.innerHTML = selectedFiles.map((file, idx) => `
                <div class="file-chip">
                    <span class="file-chip-icon">${getFileIcon(file.name)}</span>
                    <div class="file-chip-info">
                        <div class="file-chip-name">${escapeHtml(file.name)}</div>
                        <div class="file-chip-size">${formatSize(file.size)}</div>
                    </div>
                    <button class="file-chip-remove" onclick="removeFile(${idx})">✕</button>
                </div>
            `).join('');
        }

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const videoExts = ['mp4', 'avi', 'mov', 'mkv', 'webm', 'flv'];
            return videoExts.includes(ext) ? '🎬' : '🎵';
        }

        function removeFile(idx) {
            selectedFiles.splice(idx, 1);
            renderFileList();
        }

        clearBtn.addEventListener('click', () => {
            selectedFiles = [];
            renderFileList();
            resultPanel.classList.remove('active');
            currentResult = null;
        });

        // ==================== 识别处理 ====================
        startBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) {
                showToast('请先选择文件', 'error');
                return;
            }

            startBtn.disabled = true;
            progressPanel.classList.add('active');
            updateProgress(0, '准备识别...');

            const total = selectedFiles.length;

            if (total > 1) {
                await handleBatchProcess(total);
            } else {
                await handleSingleProcess(selectedFiles[0]);
            }

            startBtn.disabled = false;
            setTimeout(() => progressPanel.classList.remove('active'), 2000);
        });

        async function handleSingleProcess(file) {
            updateProgress(10, '正在上传...');
            
            const formData = new FormData();
            formData.append('file', file);
            if (outputFormat.value !== 'text') formData.append('return_srt', 'true');
            
            const hotwords = hotwordsInput.value.trim();
            if (hotwords) formData.append('hotwords', hotwords);

            try {
                updateProgress(30, '正在识别...');
                const response = await fetch('/recognize', { method: 'POST', body: formData });
                const data = await response.json();

                if (data.code === 0) {
                    updateProgress(100, '识别完成！');
                    currentResult = {
                        filename: file.name,
                        text: data.text,
                        segments: data.segments || [],
                        srt: data.srt || null,
                        audio_hash: data.audio_hash || ''
                    };
                    currentAudioHash = data.audio_hash || '';
                    displayResult();
                    resultPanel.classList.add('active');
                    actionBar.style.display = 'flex';
                    showToast('识别完成！', 'success');
                } else {
                    throw new Error(data.error);
                }
            } catch (err) {
                updateProgress(0, '识别失败');
                showToast('识别失败: ' + err.message, 'error');
            }
        }

        async function handleBatchProcess(total) {
            const formData = new FormData();
            for (const file of selectedFiles) formData.append('files', file);
            if (outputFormat.value !== 'text') formData.append('return_srt', 'true');

            try {
                const response = await fetch('/batch-recognize', { method: 'POST', body: formData });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    let currentEvent = '';
                    for (const line of lines) {
                        if (line.startsWith('event: ')) {
                            currentEvent = line.slice(7).trim();
                        } else if (line.startsWith('data: ') && currentEvent) {
                            const data = JSON.parse(line.slice(6));
                            if (currentEvent === 'file_progress') {
                                const pct = Math.round((data.current / data.total) * 100);
                                updateProgress(pct, `正在处理: ${data.filename}`);
                            } else if (currentEvent === 'complete' && data.results?.length > 0) {
                                const r = data.results[0];
                                currentResult = {
                                    filename: r.filename,
                                    text: r.text,
                                    segments: r.segments || [],
                                    srt: r.srt || null,
                                    audio_hash: data.audio_hash || ''
                                };
                                currentAudioHash = data.audio_hash || '';
                                displayResult();
                                resultPanel.classList.add('active');
                                actionBar.style.display = 'flex';
                                showToast('批量识别完成！', 'success');
                            }
                            currentEvent = '';
                        }
                    }
                }
            } catch (err) {
                showToast('批量识别失败: ' + err.message, 'error');
            }
        }

        // ==================== 进度更新 ====================
        function updateProgress(percent, message) {
            progressBar.style.width = percent + '%';
            progressPercent.textContent = percent + '%';
            progressTitle.textContent = message;
            
            const stages = progressStages.querySelectorAll('.stage-tag');
            stages.forEach((stage, idx) => {
                stage.classList.remove('active', 'done');
                const threshold = (idx + 1) * 20;
                if (percent >= threshold) {
                    stage.classList.add('done');
                } else if (percent >= threshold - 10) {
                    stage.classList.add('active');
                }
            });
        }

        // ==================== 结果显示 ====================
        function displayResult() {
            if (!currentResult) return;
            switch (activeTab) {
                case 'text': renderTextTab(); break;
                case 'segments': renderSegmentsTab(); break;
                case 'srt': renderSRTTab(); break;
            }
            updateActionButtons();
        }

        function renderTextTab() {
            let text = '';
            if (currentResult.segments && currentResult.segments.length > 0) {
                text = currentResult.segments.map((seg, idx) => {
                    return modifiedSegments.has(idx) 
                        ? modifiedSegments.get(idx).corrected 
                        : (seg.text_with_punc || seg.text || '');
                }).join('');
            } else {
                text = currentResult.text || '无识别结果';
            }
            resultBody.innerHTML = `<div class="text-result">${escapeHtml(text)}</div>`;
        }

        function renderSegmentsTab() {
            const segments = currentResult.segments || [];
            if (segments.length === 0) {
                resultBody.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><div>无时间轴片段</div></div>';
                return;
            }

            resultBody.innerHTML = `<div class="segment-list">${segments.map((seg, idx) => {
                const isModified = modifiedSegments.has(idx);
                const displayText = isModified ? modifiedSegments.get(idx).corrected : (seg.text_with_punc || seg.text);
                return `
                    <div class="segment-card ${isModified ? 'modified' : ''}" data-idx="${idx}">
                        <div class="segment-header">
                            <div class="segment-time">
                                <span>⏱</span>
                                <span>${formatTime(seg.start)} → ${formatTime(seg.end)}</span>
                            </div>
                            <div class="segment-actions">
                                <button class="btn-icon" onclick="startEdit(${idx})" title="编辑">✏️</button>
                            </div>
                        </div>
                        <div class="segment-text" id="seg-text-${idx}" 
                             ${isModified ? '' : 'contenteditable="true"'}
                             onblur="finishEdit(${idx}, this)"
                             onkeydown="handleEditKey(event, ${idx})">
                            ${escapeHtml(displayText)}
                        </div>
                        <div class="segment-feedback-bar">
                            <span class="feedback-status">✓ 已修改</span>
                            <button class="btn btn-secondary btn-sm" onclick="cancelEdit(${idx})">取消</button>
                            <button class="btn btn-primary btn-sm" onclick="submitFeedback(${idx})">提交反馈</button>
                        </div>
                    </div>
                `;
            }).join('')}</div>`;

            const badge = document.getElementById('segmentBadge');
            badge.textContent = segments.length;
            badge.style.display = 'inline';
        }

        function renderSRTTab() {
            const srt = generateSRT();
            resultBody.innerHTML = `<pre class="srt-preview">${escapeHtml(srt || '无字幕内容')}</pre>`;
        }

        // ==================== 字幕编辑 ====================
        function startEdit(idx) {
            const el = document.getElementById(`seg-text-${idx}`);
            if (el) {
                el.contentEditable = true;
                el.focus();
                const range = document.createRange();
                range.selectNodeContents(el);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            }
        }

        function finishEdit(idx, el) {
            const original = currentResult.segments[idx]?.text || '';
            const corrected = el.textContent.trim();
            
            if (corrected !== original) {
                const oldData = modifiedSegments.get(idx);
                modifiedSegments.set(idx, {
                    original: original,
                    corrected: corrected,
                    start: currentResult.segments[idx].start,
                    end: currentResult.segments[idx].end
                });
                pushHistory({ action: 'edit', idx, oldData, newData: modifiedSegments.get(idx) });
            } else {
                modifiedSegments.delete(idx);
            }
            
            displayResult();
            updateActionButtons();
        }

        function handleEditKey(event, idx) {
            if (event.key === 'Enter') {
                event.preventDefault();
                event.target.blur();
            } else if (event.ctrlKey && event.key === 'z') {
                event.preventDefault();
                undo();
            } else if (event.ctrlKey && event.key === 'y') {
                event.preventDefault();
                redo();
            } else if (event.ctrlKey && event.key === 'Enter') {
                event.preventDefault();
                submitFeedback(idx);
            }
        }

        function cancelEdit(idx) {
            const oldData = modifiedSegments.get(idx);
            if (oldData) {
                pushHistory({ action: 'cancel', idx, oldData, newData: null });
            }
            modifiedSegments.delete(idx);
            displayResult();
            updateActionButtons();
        }

        // ==================== 历史记录 ====================
        function pushHistory(record) {
            editHistory = editHistory.slice(0, historyIndex + 1);
            editHistory.push(record);
            historyIndex++;
        }

        function undo() {
            if (historyIndex < 0) return;
            const record = editHistory[historyIndex];
            if (record.action === 'edit') {
                if (record.oldData) modifiedSegments.set(record.idx, record.oldData);
                else modifiedSegments.delete(record.idx);
            } else if (record.action === 'cancel') {
                modifiedSegments.set(record.idx, record.oldData);
            }
            historyIndex--;
            displayResult();
            updateActionButtons();
        }

        function redo() {
            if (historyIndex >= editHistory.length - 1) return;
            historyIndex++;
            const record = editHistory[historyIndex];
            if (record.action === 'edit') {
                modifiedSegments.set(record.idx, record.newData);
            } else if (record.action === 'cancel') {
                modifiedSegments.delete(record.idx);
            }
            displayResult();
            updateActionButtons();
        }

        function updateActionButtons() {
            document.getElementById('undoBtn').disabled = historyIndex < 0;
            document.getElementById('redoBtn').disabled = historyIndex >= editHistory.length - 1;
            document.getElementById('submitAllBtn').style.display = modifiedSegments.size > 0 ? 'flex' : 'none';
        }

        // ==================== 反馈提交 ====================
        async function submitFeedback(idx) {
            const data = modifiedSegments.get(idx);
            if (!data || !currentAudioHash) {
                showToast('无法提交反馈', 'error');
                return;
            }

            try {
                const formData = new FormData();
                formData.append('audio_hash', currentAudioHash);
                formData.append('segment_id', idx);
                formData.append('original_text', data.original);
                formData.append('corrected_text', data.corrected);
                formData.append('start', data.start);
                formData.append('end', data.end);
                formData.append('error_type', 'recognition');

                const response = await fetch('/feedback', { method: 'POST', body: formData });
                const result = await response.json();

                if (result.code === 0) {
                    showToast('反馈已提交', 'success');
                    const correctedData = modifiedSegments.get(idx);
                    if (correctedData && currentResult && currentResult.segments[idx]) {
                        currentResult.segments[idx].text = correctedData.corrected;
                        currentResult.segments[idx].text_with_punc = correctedData.corrected;
                    }
                    modifiedSegments.delete(idx);
                    displayResult();
                    updateActionButtons();
                } else {
                    throw new Error(result.error);
                }
            } catch (err) {
                showToast('提交失败: ' + err.message, 'error');
            }
        }

        async function submitAllFeedback() {
            if (modifiedSegments.size === 0) return;
            
            let success = 0, failed = 0;
            for (const [idx, data] of modifiedSegments) {
                try {
                    const formData = new FormData();
                    formData.append('audio_hash', currentAudioHash);
                    formData.append('segment_id', idx);
                    formData.append('original_text', data.original);
                    formData.append('corrected_text', data.corrected);
                    formData.append('start', data.start);
                    formData.append('end', data.end);
                    formData.append('error_type', 'recognition');

                    const response = await fetch('/feedback', { method: 'POST', body: formData });
                    const result = await response.json();
                    if (result.code === 0) success++;
                    else failed++;
                } catch (err) {
                    failed++;
                }
            }

            showToast(`提交完成: ${success} 成功${failed > 0 ? ', ' + failed + ' 失败' : ''}`, success > 0 ? 'success' : 'error');
            
            if (success > 0) {
                for (const [idx, data] of modifiedSegments) {
                    if (currentResult && currentResult.segments[idx]) {
                        currentResult.segments[idx].text = data.corrected;
                        currentResult.segments[idx].text_with_punc = data.corrected;
                    }
                }
                modifiedSegments.clear();
                displayResult();
                updateActionButtons();
            }
        }

        // ==================== 热词加载 ====================
        async function loadCurrentHotwords() {
            try {
                const response = await fetch('/hotwords');
                const data = await response.json();
                if (data.code === 0) {
                    const words = data.hotwords || [];
                    currentHotwords.innerHTML = words.length > 0 
                        ? words.map(w => `<span style="display: inline-block; padding: 2px 8px; background: rgba(0,212,170,0.15); color: var(--accent-primary); border-radius: 4px; margin: 2px; font-size: 0.8rem;">${escapeHtml(w)}</span>`).join('')
                        : '<span style="color: var(--text-muted);">暂无热词</span>';
                }
            } catch (err) {
                currentHotwords.textContent = '加载失败';
            }
        }

        async function loadEngineInfo() {
            try {
                const response = await fetch('/health');
                const data = await response.json();
                if (data.engine_display) {
                    document.getElementById('engineBadge').textContent = '🔧 ' + data.engine_display;
                }
            } catch (err) {
                console.error('加载引擎信息失败:', err);
            }
        }

        // ==================== Tab 切换 ====================
        document.querySelectorAll('.result-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.result-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                activeTab = tab.dataset.tab;
                displayResult();
            });
        });

        // ==================== 操作按钮 ====================
        document.getElementById('copyBtn').addEventListener('click', () => {
            const text = activeTab === 'srt' ? generateSRT() : (currentResult?.text || '');
            navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板', 'success'));
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const srt = generateSRT();
            if (!srt) return;
            const blob = new Blob([srt], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = (currentResult?.filename || 'subtitle').replace(/\.[^/.]+$/, '') + '.srt';
            a.click();
            URL.revokeObjectURL(url);
            showToast('字幕已下载', 'success');
        });

        document.getElementById('previewBtn').addEventListener('click', () => {
            const srt = generateSRT();
            if (!srt) return;
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.8); z-index: 1000; display: flex;
                justify-content: center; align-items: center; padding: 20px;
            `;
            modal.innerHTML = `
                <div style="background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; 
                            max-width: 800px; width: 100%; max-height: 80vh; overflow: auto; padding: 24px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                        <h3 style="font-size: 1.1rem;">🎬 SRT 预览</h3>
                        <button class="btn-icon" onclick="this.closest('.modal-overlay').remove()">✕</button>
                    </div>
                    <pre style="background: var(--bg-primary); padding: 16px; border-radius: 8px; 
                                font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; 
                                color: var(--text-secondary); line-height: 1.8;">${escapeHtml(srt)}</pre>
                </div>
            `;
            modal.className = 'modal-overlay';
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
            document.body.appendChild(modal);
        });

        document.getElementById('undoBtn').addEventListener('click', undo);
        document.getElementById('redoBtn').addEventListener('click', redo);
        document.getElementById('submitAllBtn').addEventListener('click', submitAllFeedback);

        // ==================== 工具函数 ====================
        function generateSRT() {
            if (!currentResult?.segments) return null;
            let srt = '';
            currentResult.segments.forEach((seg, idx) => {
                const text = modifiedSegments.has(idx) 
                    ? modifiedSegments.get(idx).corrected 
                    : (seg.text_with_punc || seg.text || '');
                srt += `${idx + 1}\n`;
                srt += `${formatSRTTime(seg.start)} --> ${formatSRTTime(seg.end)}\n`;
                srt += `${text}\n\n`;
            });
            return srt;
        }

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            const ms = Math.floor((seconds % 1) * 1000);
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${ms.toString().padStart(3,'0')}`;
        }

        function formatSRTTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            const ms = Math.floor((seconds % 1) * 1000);
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')},${ms.toString().padStart(3,'0')}`;
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'success') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = type === 'success' ? `✓ ${message}` : `✕ ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
