<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音转字幕 - 智能字幕生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        
        .upload-area {
            border: 2px dashed #cbd5e0;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f7fafc;
        }
        
        .upload-area:hover {
            border-color: #667eea;
            background: #edf2f7;
        }
        
        .upload-area.dragover {
            border-color: #667eea;
            background: #e9d8fd;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .file-info {
            margin-top: 15px;
            color: #4a5568;
        }
        
        .file-list {
            margin-top: 20px;
        }
        
        .file-item {
            background: #edf2f7;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .file-name {
            font-weight: 500;
            color: #2d3748;
        }
        
        .file-size {
            font-size: 0.85rem;
            color: #718096;
        }
        
        .remove-file {
            background: #fc8181;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .options {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .option-group {
            flex: 1;
            min-width: 200px;
        }
        
        .option-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            color: #4a5568;
            margin-bottom: 8px;
        }
        
        .option-group input, .option-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.9rem;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 🎯 优化：更好的进度展示 */
        .progress-container {
            margin-top: 20px;
            display: none;
        }
        
        .progress-stages {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: #718096;
        }
        
        .progress-stage {
            padding: 4px 12px;
            border-radius: 20px;
            background: #e2e8f0;
            transition: all 0.3s;
        }
        
        .progress-stage.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .progress-stage.done {
            background: #48bb78;
            color: white;
        }
        
        .progress-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
            border-radius: 10px;
        }
        
        .progress-text {
            text-align: center;
            margin-top: 10px;
            color: #4a5568;
            font-size: 0.9rem;
        }
        
        .result-area {
            margin-top: 20px;
        }
        
        .result-tabs {
            display: flex;
            gap: 10px;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 20px;
        }
        
        .result-tab {
            padding: 10px 20px;
            cursor: pointer;
            color: #718096;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .result-tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            margin-bottom: -2px;
        }
        
        .result-content {
            background: #f7fafc;
            border-radius: 12px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
        }
        
        .segment-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        
        .segment-time {
            font-size: 0.75rem;
            color: #718096;
            margin-bottom: 5px;
        }
        
        .segment-text {
            color: #2d3748;
            line-height: 1.5;
        }
        
        .segment-text[contenteditable="true"] {
            background: #fffbeb;
            border: 1px solid #f59e0b;
            border-radius: 4px;
            padding: 4px 8px;
            outline: none;
        }
        
        .segment-text[contenteditable="true"]:focus {
            background: #fef3c7;
            border-color: #d97706;
        }
        
        .segment-text.modified {
            border-left: 3px solid #10b981;
            padding-left: 8px;
        }
        
        .feedback-badge {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            margin-left: 8px;
            vertical-align: middle;
        }
        
        .feedback-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            align-items: center;
        }
        
        .btn-feedback {
            background: #10b981;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-feedback:hover {
            background: #059669;
        }
        
        .btn-feedback:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        
        .btn-cancel {
            background: #f3f4f6;
            color: #6b7280;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        
        .btn-cancel:hover {
            background: #e5e7eb;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .btn-small {
            background: #edf2f7;
            color: #4a5568;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-small:hover {
            background: #e2e8f0;
        }
        
        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 12px 16px;
            border-radius: 10px;
            margin-top: 15px;
        }
        
        .success-message {
            background: #c6f6d5;
            color: #22543d;
            padding: 12px 16px;
            border-radius: 10px;
            margin-top: 15px;
        }
        
        .badge {
            display: inline-block;
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #4a5568;
            margin-left: 8px;
        }
        
        @media (max-width: 768px) {
            .card {
                padding: 20px;
            }
            
            .options {
                flex-direction: column;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎙️ 智能字幕生成器</h1>
            <p>基于 FunASR Paraformer 的高准确率语音识别 | 支持视频/音频转字幕</p>
        </div>
        
        <div class="card">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <div>点击或拖拽文件到此区域上传</div>
                <div class="file-info">支持 MP4, AVI, MOV, MKV, MP3, WAV, FLAC, M4A 等格式</div>
                <input type="file" id="fileInput" multiple style="display: none;" accept="video/*,audio/*">
            </div>
            
            <div class="file-list" id="fileList"></div>
            
            <div class="options">
                <div class="option-group">
                    <label>🔧 输出格式</label>
                    <select id="outputFormat">
                        <option value="text">纯文本</option>
                        <option value="srt">SRT 字幕</option>
                        <option value="both" selected>文本 + SRT</option>
                    </select>
                </div>
                <div class="option-group">
                    <label>📝 热词（逗号分隔，可选）</label>
                    <input type="text" id="hotwords" placeholder="例如: 人工智能,深度学习,机器学习">
                </div>
            </div>
            
            <div style="margin-top: 20px; text-align: center;">
                <button class="btn" id="uploadBtn">🚀 开始识别</button>
                <button class="btn-small" id="clearBtn" style="margin-left: 12px;">🗑️ 清空列表</button>
            </div>
            
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">处理中...</div>
            </div>
        </div>
        
        <div class="card" id="resultCard" style="display: none;">
            <div class="result-tabs">
                <div class="result-tab active" data-tab="text">📄 识别文本</div>
                <div class="result-tab" data-tab="segments">📝 时间轴片段</div>
                <div class="result-tab" data-tab="srt">🎬 SRT 字幕</div>
            </div>
            <div class="result-content" id="resultContent"></div>
            <div class="action-buttons" id="actionButtons"></div>
            <div class="action-buttons" style="margin-top: 10px;">
                <button class="btn-small" id="undoBtn" onclick="undo()" disabled>↩️ 撤销</button>
                <button class="btn-small" id="redoBtn" onclick="redo()" disabled>↪️ 重做</button>
                <button class="btn-small" onclick="previewModifiedSRT()">👁️ 预览修改</button>
            </div>
            <div id="feedbackSummary" style="margin-top: 15px; display: none;">
                <div class="success-message">
                    ✅ 已标记 <span id="modifiedCount">0</span> 处修改，
                    <button class="btn-feedback" id="submitAllFeedback">提交反馈</button>
                    <button class="btn-cancel" id="cancelAllFeedback">取消</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let selectedFiles = [];
        let currentResult = null;
        let modifiedSegments = new Map(); // segment_id -> {original, corrected, start, end}
        let editHistory = []; // 撤销栈: {action: 'edit'|'cancel', idx, data}
        let historyIndex = -1;
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileListDiv = document.getElementById('fileList');
        const uploadBtn = document.getElementById('uploadBtn');
        const clearBtn = document.getElementById('clearBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const resultCard = document.getElementById('resultCard');
        const resultContent = document.getElementById('resultContent');
        const actionButtons = document.getElementById('actionButtons');
        const outputFormat = document.getElementById('outputFormat');
        const hotwordsInput = document.getElementById('hotwords');
        
        // 文件上传区域事件
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files);
            addFiles(files);
        });
        
        fileInput.addEventListener('change', (e) => {
            addFiles(Array.from(e.target.files));
            fileInput.value = '';
        });
        
        function addFiles(files) {
            const validExtensions = ['.mp4', '.avi', '.mov', '.mkv', '.webm', '.flv', 
                                      '.mp3', '.wav', '.flac', '.m4a', '.ogg', '.aac'];
            
            for (const file of files) {
                const ext = '.' + file.name.split('.').pop().toLowerCase();
                if (validExtensions.includes(ext) && !selectedFiles.find(f => f.name === file.name)) {
                    selectedFiles.push(file);
                }
            }
            renderFileList();
        }
        
        function renderFileList() {
            if (selectedFiles.length === 0) {
                fileListDiv.innerHTML = '';
                return;
            }
            
            fileListDiv.innerHTML = selectedFiles.map((file, idx) => `
                <div class="file-item">
                    <div>
                        <div class="file-name">${escapeHtml(file.name)}</div>
                        <div class="file-size">${formatFileSize(file.size)}</div>
                    </div>
                    <button class="remove-file" onclick="removeFile(${idx})">移除</button>
                </div>
            `).join('');
        }
        
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            renderFileList();
        }
        
        clearBtn.addEventListener('click', () => {
            selectedFiles = [];
            renderFileList();
            resultCard.style.display = 'none';
            currentResult = null;
        });
        
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        uploadBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) {
                alert('请先选择文件');
                return;
            }
            
            uploadBtn.disabled = true;
            progressContainer.style.display = 'block';
            progressFill.style.width = '0%';
            
            const total = selectedFiles.length;
            
            // 多文件使用 SSE 批量接口
            if (total > 1) {
                const formData = new FormData();
                for (const file of selectedFiles) {
                    formData.append('files', file);
                }
                
                const format = outputFormat.value;
                if (format === 'srt' || format === 'both') {
                    formData.append('return_srt', 'true');
                }
                
                try {
                    const response = await fetch('/batch-recognize', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';
                    let finalResult = null;
                    
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop(); // 保留不完整的行
                        
                        let currentEvent = '';
                        for (const line of lines) {
                            if (line.startsWith('event: ')) {
                                currentEvent = line.slice(7).trim();
                                continue;
                            }
                            if (line.startsWith('data: ') && currentEvent) {
                                const data = JSON.parse(line.slice(6));
                                
                                if (currentEvent === 'file_progress') {
                                    progressFill.style.width = `${(data.current / data.total) * 100}%`;
                                    progressText.textContent = `正在处理: ${data.filename} (${data.current + 1}/${data.total})`;
                                } else if (currentEvent === 'file_done') {
                                    progressFill.style.width = `${(data.current / data.total) * 100}%`;
                                    progressText.textContent = `已完成: ${data.filename}`;
                                } else if (currentEvent === 'complete') {
                                    finalResult = data;
                                }
                                currentEvent = '';
                            }
                        }
                    }
                    
                    // 获取最终结果
                    progressFill.style.width = '100%';
                    progressText.textContent = '处理完成！';
                    
                    if (finalResult && finalResult.code === 0 && finalResult.results.length > 0) {
                        currentResult = finalResult.results[0];
                        currentResult.audio_hash = finalResult.audio_hash || '';
                        displayResult(currentResult);
                        resultCard.style.display = 'block';
                    }
                    
                } catch (err) {
                    alert('处理失败: ' + err.message);
                }
            } else {
                // 单文件使用原有接口
                const results = [];
                for (let i = 0; i < selectedFiles.length; i++) {
                    const file = selectedFiles[i];
                    progressFill.style.width = `${(i / total) * 100}%`;
                    progressText.textContent = `正在处理: ${file.name} (${i+1}/${total})`;
                    
                    const formData = new FormData();
                    formData.append('file', file);
                    
                    const format = outputFormat.value;
                    if (format === 'srt' || format === 'both') {
                        formData.append('return_srt', 'true');
                    }
                    
                    const hotwords = hotwordsInput.value.trim();
                    if (hotwords) {
                        formData.append('hotwords', hotwords);
                    }
                    
                    try {
                        const response = await fetch('/recognize', {
                            method: 'POST',
                            body: formData
                        });
                        const data = await response.json();
                        
                        if (data.code === 0) {
                            results.push({
                                filename: file.name,
                                text: data.text,
                                srt: data.srt || null,
                                segments: data.segments || [],
                                audio_hash: data.audio_hash || ''
                            });
                        } else {
                            results.push({
                                filename: file.name,
                                error: data.error || '识别失败'
                            });
                        }
                    } catch (err) {
                        results.push({
                            filename: file.name,
                            error: err.message
                        });
                    }
                }
                
                progressFill.style.width = '100%';
                progressText.textContent = '处理完成！';
                
                if (results.length > 0) {
                    currentResult = results[0];
                    displayResult(currentResult);
                    resultCard.style.display = 'block';
                }
            }
            
            setTimeout(() => {
                progressContainer.style.display = 'none';
            }, 2000);
            
            uploadBtn.disabled = false;
        });
        
        function displayResult(result) {
            const activeTab = document.querySelector('.result-tab.active').dataset.tab;
            
            if (result.error) {
                resultContent.innerHTML = `<div class="error-message">❌ 错误: ${escapeHtml(result.error)}</div>`;
                actionButtons.innerHTML = '';
                return;
            }
            
            if (activeTab === 'text') {
                resultContent.innerHTML = `<div style="white-space: pre-wrap;">${escapeHtml(result.text || '无识别结果')}</div>`;
                actionButtons.innerHTML = `
                    <button class="btn-small" onclick="copyToClipboard('${escapeHtml(result.text || '').replace(/'/g, "\\'")}')">📋 复制文本</button>
                `;
            } else if (activeTab === 'segments' && result.segments) {
                if (result.segments.length === 0) {
                    resultContent.innerHTML = '<div>无时间轴片段</div>';
                } else {
                    resultContent.innerHTML = result.segments.map((seg, idx) => `
                        <div class="segment-item" data-segment-id="${idx}">
                            <div class="segment-time">
                                ${formatTime(seg.start)} → ${formatTime(seg.end)}
                                ${modifiedSegments.has(idx) ? '<span class="feedback-badge">已修改</span>' : ''}
                            </div>
                            <div class="segment-text" 
                                 contenteditable="true" 
                                 data-original="${escapeHtml(seg.text)}"
                                 data-start="${seg.start}"
                                 data-end="${seg.end}"
                                 onblur="handleSegmentEdit(${idx}, this)"
                                 onkeydown="handleEditKeydown(event, ${idx})">
                                ${escapeHtml(modifiedSegments.has(idx) ? modifiedSegments.get(idx).corrected : seg.text)}
                            </div>
                            ${modifiedSegments.has(idx) ? `
                                <div class="feedback-actions">
                                    <button class="btn-feedback" onclick="submitSegmentFeedback(${idx})">提交反馈</button>
                                    <button class="btn-cancel" onclick="cancelSegmentEdit(${idx})">取消</button>
                                </div>
                            ` : ''}
                        </div>
                    `).join('');
                }
                actionButtons.innerHTML = `
                    <button class="btn-small" onclick="enableAllEdit()">✏️ 批量编辑</button>
                    <button class="btn-small" onclick="submitAllModified()">📤 提交所有修改</button>
                `;
            } else if (activeTab === 'srt') {
                const srt = generateSRT() || result.srt || '';
                resultContent.innerHTML = `<pre style="font-family: monospace; white-space: pre-wrap;">${escapeHtml(srt)}</pre>`;
                actionButtons.innerHTML = `
                    <button class="btn-small" onclick="downloadSRT()">💾 下载 SRT 文件</button>
                    <button class="btn-small" onclick="copyToClipboard(${JSON.stringify(srt)})">📋 复制 SRT</button>
                    <button class="btn-small" onclick="previewModifiedSRT()">👁️ 预览修改</button>
                `;
            } else {
                resultContent.innerHTML = '<div>无可用结果</div>';
                actionButtons.innerHTML = '';
            }
        }
        
        function formatTime(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = Math.floor(seconds % 60);
            const ms = Math.floor((seconds % 1) * 1000);
            return `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')},${ms.toString().padStart(3,'0')}`;
        }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('已复制到剪贴板');
            }).catch(() => {
                alert('复制失败');
            });
        }
        
        function downloadSRT() {
            const srt = generateSRT();
            if (srt) {
                const blob = new Blob([srt], {type: 'text/plain'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'subtitle.srt';
                a.click();
                URL.revokeObjectURL(url);
            }
        }
        
        function generateSRT() {
            if (!currentResult || !currentResult.segments) return null;
            
            let srt = '';
            currentResult.segments.forEach((seg, idx) => {
                const text = modifiedSegments.has(idx) ? modifiedSegments.get(idx).corrected : seg.text;
                srt += `${idx + 1}\n`;
                srt += `${formatSRTTime(seg.start)} --> ${formatSRTTime(seg.end)}\n`;
                srt += `${text}\n\n`;
            });
            return srt;
        }
        
        function formatSRTTime(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = Math.floor(seconds % 60);
            const ms = Math.floor((seconds % 1) * 1000);
            return `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')},${ms.toString().padStart(3,'0')}`;
        }
        
        function previewModifiedSRT() {
            const srt = generateSRT();
            if (!srt) {
                alert('无可用字幕');
                return;
            }
            
            // 创建模态框预览
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.7); z-index: 1000; display: flex;
                justify-content: center; align-items: center;
            `;
            modal.innerHTML = `
                <div style="background: white; border-radius: 12px; padding: 20px; max-width: 80%; max-height: 80%; overflow: auto;">
                    <h3 style="margin-bottom: 15px;">修改后的 SRT 预览</h3>
                    <pre style="background: #f7fafc; padding: 15px; border-radius: 8px; font-size: 0.85rem; white-space: pre-wrap;">${escapeHtml(srt)}</pre>
                    <div style="margin-top: 15px; text-align: right;">
                        <button class="btn-small" onclick="this.closest('.modal').remove()">关闭</button>
                        <button class="btn-feedback" onclick="downloadSRT(); this.closest('.modal').remove();">下载</button>
                    </div>
                </div>
            `;
            modal.className = 'modal';
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });
            document.body.appendChild(modal);
        }
        
        // ========== 字幕编辑与反馈功能 ==========
        
        function handleSegmentEdit(idx, element) {
            const original = element.dataset.original;
            const corrected = element.textContent.trim();
            const start = parseFloat(element.dataset.start);
            const end = parseFloat(element.dataset.end);
            
            const oldData = modifiedSegments.get(idx);
            
            if (corrected !== original) {
                modifiedSegments.set(idx, {
                    original: original,
                    corrected: corrected,
                    start: start,
                    end: end
                });
                element.classList.add('modified');
                
                // 添加到历史记录
                pushHistory({
                    action: 'edit',
                    idx: idx,
                    oldData: oldData || null,
                    newData: {original, corrected, start, end}
                });
            } else {
                if (modifiedSegments.has(idx)) {
                    pushHistory({
                        action: 'cancel',
                        idx: idx,
                        oldData: modifiedSegments.get(idx),
                        newData: null
                    });
                }
                modifiedSegments.delete(idx);
                element.classList.remove('modified');
            }
            
            updateFeedbackSummary();
            updateUndoRedoButtons();
            // 重新渲染以显示/隐藏操作按钮
            if (document.querySelector('.result-tab.active').dataset.tab === 'segments') {
                displayResult(currentResult);
            }
        }
        
        function pushHistory(record) {
            // 删除当前位置之后的历史
            editHistory = editHistory.slice(0, historyIndex + 1);
            editHistory.push(record);
            historyIndex++;
        }
        
        function undo() {
            if (historyIndex < 0) return;
            
            const record = editHistory[historyIndex];
            if (record.action === 'edit') {
                if (record.oldData) {
                    modifiedSegments.set(record.idx, record.oldData);
                } else {
                    modifiedSegments.delete(record.idx);
                }
            } else if (record.action === 'cancel') {
                modifiedSegments.set(record.idx, record.oldData);
            }
            
            historyIndex--;
            updateFeedbackSummary();
            updateUndoRedoButtons();
            displayResult(currentResult);
        }
        
        function redo() {
            if (historyIndex >= editHistory.length - 1) return;
            
            historyIndex++;
            const record = editHistory[historyIndex];
            if (record.action === 'edit') {
                modifiedSegments.set(record.idx, record.newData);
            } else if (record.action === 'cancel') {
                modifiedSegments.delete(record.idx);
            }
            
            updateFeedbackSummary();
            updateUndoRedoButtons();
            displayResult(currentResult);
        }
        
        function updateUndoRedoButtons() {
            const undoBtn = document.getElementById('undoBtn');
            const redoBtn = document.getElementById('redoBtn');
            if (undoBtn) undoBtn.disabled = historyIndex < 0;
            if (redoBtn) redoBtn.disabled = historyIndex >= editHistory.length - 1;
        }
        
        function handleEditKeydown(event, idx) {
            if (event.key === 'Enter') {
                event.preventDefault();
                event.target.blur();
            } else if (event.ctrlKey && event.key === 'z') {
                event.preventDefault();
                undo();
            } else if (event.ctrlKey && event.key === 'y') {
                event.preventDefault();
                redo();
            } else if (event.ctrlKey && event.key === 'Enter') {
                event.preventDefault();
                submitSegmentFeedback(idx);
            }
        }
        
        function cancelSegmentEdit(idx) {
            modifiedSegments.delete(idx);
            updateFeedbackSummary();
            displayResult(currentResult);
        }
        
        function updateFeedbackSummary() {
            const summary = document.getElementById('feedbackSummary');
            const count = document.getElementById('modifiedCount');
            
            if (modifiedSegments.size > 0) {
                count.textContent = modifiedSegments.size;
                summary.style.display = 'block';
            } else {
                summary.style.display = 'none';
            }
        }
        
        function enableAllEdit() {
            // 切换到 segments tab
            document.querySelectorAll('.result-tab').forEach(t => t.classList.remove('active'));
            document.querySelector('[data-tab="segments"]').classList.add('active');
            displayResult(currentResult);
            
            // 聚焦第一个可编辑区域
            const firstEdit = document.querySelector('.segment-text[contenteditable="true"]');
            if (firstEdit) firstEdit.focus();
        }
        
        async function submitSegmentFeedback(idx) {
            const data = modifiedSegments.get(idx);
            if (!data) return;
            
            await submitFeedback(idx, data.original, data.corrected, data.start, data.end);
        }
        
        async function submitAllModified() {
            if (modifiedSegments.size === 0) {
                alert('没有待提交的修改');
                return;
            }
            
            let success = 0;
            let failed = 0;
            
            for (const [idx, data] of modifiedSegments) {
                const ok = await submitFeedback(idx, data.original, data.corrected, data.start, data.end, false);
                if (ok) success++;
                else failed++;
            }
            
            alert(`提交完成: ${success} 成功, ${failed} 失败`);
            
            if (failed === 0) {
                modifiedSegments.clear();
                updateFeedbackSummary();
                displayResult(currentResult);
            }
        }
        
        async function submitFeedback(segmentId, original, corrected, start, end, showAlert = true) {
            if (!currentResult || !currentResult.audio_hash) {
                if (showAlert) alert('无法获取音频标识，请重新识别');
                return false;
            }
            
            try {
                const formData = new FormData();
                formData.append('audio_hash', currentResult.audio_hash);
                formData.append('segment_id', segmentId);
                formData.append('original_text', original);
                formData.append('corrected_text', corrected);
                formData.append('start', start);
                formData.append('end', end);
                formData.append('error_type', 'recognition');
                
                const response = await fetch('/feedback', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.code === 0) {
                    if (showAlert) alert('反馈已提交，感谢您的帮助！');
                    return true;
                } else {
                    if (showAlert) alert('提交失败: ' + result.error);
                    return false;
                }
            } catch (err) {
                if (showAlert) alert('提交失败: ' + err.message);
                return false;
            }
        }
        
        // 绑定批量操作按钮
        document.getElementById('submitAllFeedback').addEventListener('click', submitAllModified);
        document.getElementById('cancelAllFeedback').addEventListener('click', () => {
            modifiedSegments.clear();
            updateFeedbackSummary();
            displayResult(currentResult);
        });
        
        // Tab 切换
        document.querySelectorAll('.result-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.result-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                if (currentResult) {
                    displayResult(currentResult);
                }
            });
        });
    </script>
</body>
</html>
